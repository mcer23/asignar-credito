<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asignar crédito-Captura</title>
    <link rel="shortcut icon" href="../assets/img/favico.png" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                  <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Inicio</a>
                  </li>  
                  <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Captura</a>
                  </li>  
                  <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Lista</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="#">Evaluación</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="#"><img src="../assets/ico/logout.png" alt=""></a>
                  </li>
                </ul>
              </div>
            </div>
          </nav>
    </header>
    <main>
        <section class="head--section">
            <div>
                <img src="../assets/img/Logo.png" alt="logo_img">
                <h1>Captura nuevo prospecto</h1>
                <p>Los input marcados con (*) son obligatorios.</p>
            </div>
        </section>
        <form action="#">
            <div>
                <label for="#" class="#">Nombre(s)*</label>
                <input type="text" class="" id="" placeholder="Ej. Juan Carlos" required>
            </div>
            <div>
                <label for="#" class="#">Primer apellido*</label>
                <input type="text" class="" id="" placeholder="Ej. Perez" required>
            </div>
            <div>
                <label for="#" class="#">Segundo apellido</label>
                <input type="text" class="" id="" placeholder="Ej. González">
            </div>
            <div>
                <label for="#" class="#">Teléfono</label>
                <input type="number" class="" id="" maxlength="10" placeholder="6672839027">
            </div>
            <div>
                <label for="#" class="#">Agregar documentos</label>
                <input type="file" class="" id="" accept="image/*, .pdf" multiple>
            </div>
            <div>
                <button type="submit">Guardar</button>
                <input type="button" value="Cancel">

            </div>
            

        </form>

        
    </main>



    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</body>
</html>
